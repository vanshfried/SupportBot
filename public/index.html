<!DOCTYPE html>
<html>
<head>
  <title>WhatsApp Agent Dashboard</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:40px;
    }

    .card{
      background:white;
      padding:20px;
      max-width:500px;
      margin:auto;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin-top:10px;
    }

    button{
      padding:10px 15px;
      margin-top:10px;
      cursor:pointer;
    }

    #log{
      margin-top:20px;
      height:200px;
      overflow:auto;
      background:#111;
      color:#0f0;
      padding:10px;
      font-size:12px;
    }
  </style>
</head>

<body>

<div class="card">

<h2>Agent Reply Panel</h2>

<label>User Phone Number</label>
<input id="number" placeholder="919xxxxxxxxx">

<label>Message</label>
<textarea id="message"></textarea>

<button onclick="sendReply()">Send Reply</button>
<button onclick="endSession()">End Session</button>

<div id="log"></div>

</div>

<script>

function log(text){
  const box = document.getElementById("log");
  box.innerHTML += text + "<br>";
}

async function sendReply(){

  const number = document.getElementById("number").value;
  const message = document.getElementById("message").value;

  const res = await fetch("/agent/reply",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      to:number,
      message:message
    })
  });

  const data = await res.json();

  log("Reply sent ✔");
}

async function endSession(){

  const number = document.getElementById("number").value;

  const res = await fetch("/agent/end",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      user:number
    })
  });

  const data = await res.json();

  log("Session ended ✔");
}

</script>

</body>
</html>
